<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <!-- إعداد الموبايل لمنع التكبير والتصغير العشوائي وتثبيت العرض -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>جزيرة النحو المدهشة</title>
    <!-- استدعاء خط تجوال العربي -->
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="global.css">
</head>
<body class="island-bg">
    <div class="container main-portal">
        <header class="header text-center">
            <h1>🏝️ جزيرة النحو المدهشة ⛵</h1>
            <p>أهلاً بك! اختر اللعبة الممتعة وانطلق في مغامرات النحو</p>
        </header>

        <main class="games-grid">
            <a href="table.html" class="game-card">
                <div class="card-icon">🧮</div>
                <h2>جدول الإعراب</h2>
                <p>تحدى مهاراتك في وضع العلامات الإعرابية في أماكنها الصحيحة.</p>
                <span class="btn-play">العب الآن</span>
            </a>

            <a href="trains.html" class="game-card">
                <div class="card-icon">🚂</div>
                <h2>قطار الكلمات</h2>
                <p>ساعد ناظر المحطة في توزيع الكلمات على عربات القطار المناسبة.</p>
                <span class="btn-play">العب الآن</span>
            </a>
        </main>
    </div>

    <!-- مشغل الأنشودة في الخلفية -->
    <audio id="bgMusic" loop>
        <source src="nasheed.mp3" type="audio/mpeg">
    </audio>

    <script>
        // تشغيل الأنشودة فور قيام الزائر بأول نقرة/لمسة في الموقع
        document.body.addEventListener('click', function() {
            const bgMusic = document.getElementById('bgMusic');
            if(bgMusic.paused) {
                bgMusic.play().catch(e => console.log('في انتظار تفاعل المستخدم'));
            }
        }, { once: true }); // مرة واحدة تجنبا للتكرار
    </script>
</body>
</html>
