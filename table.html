<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>لعبة جدول الإعراب</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="global.css">
    <style>
        body { background: #fdfbf7; padding-bottom: 120px; /* مساحة للبنك الثابت أسفل الشاشة */ }
        
        .top-bar {
            background: var(--primary-color);
            color: white;
            padding: 15px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            position: sticky;
            top: 0;
            z-index: 10;
        }

        .back-btn {
            color: white;
            text-decoration: none;
            font-weight: bold;
            background: rgba(255,255,255,0.2);
            padding: 5px 15px;
            border-radius: 20px;
        }

        .instruction {
            text-align: center;
            padding: 15px;
            font-size: 1.1rem;
            color: var(--text-main);
            background: #fff;
            margin: 10px;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }

        /* حاوية الجدول تدعم التمرير الأفقي بسلاسة إن لزم الأمر على الشاشات الضيقة جداً */
        .table-container {
            overflow-x: auto;
            padding: 10px;
            -webkit-overflow-scrolling: touch;
        }

        .grammar-table {
            border-collapse: separate;
            border-spacing: 4px;
            width: 100%;
            min-width: 320px;
        }

        .grammar-table th {
            background: #eef2f5;
            color: #444;
            padding: 12px 5px;
            border-radius: 8px;
            font-size: 0.95rem;
            text-align: center;
        }

        .grammar-table td {
            background: white;
            padding: 8px 4px;
            border-radius: 8px;
            text-align: center;
            vertical-align: middle;
            border: 2px dashed #ccc;
            height: 55px;
            transition: all 0.2s ease;
        }

        .row-header {
            background: #ffe0b2 !important;
            border: 2px solid #ffcc80 !important;
            font-weight: bold;
            font-size: 0.9rem !important;
            color: #d84315 !important;
            width: 30%;
        }

        /* خلايا تعبئة العلامات */
        .drop-slot {
            cursor: pointer;
            position: relative;
        }
        
        .drop-slot.selected-target {
            border-color: var(--primary-color);
            background: #e3effd;
        }

        .drop-slot.success {
            border: 2px solid var(--success-color);
            background: #e8f5e9;
            color: var(--success-color);
            font-weight: bold;
        }

        .drop-slot.error {
            border: 2px solid var(--danger-color);
            background: #ffebee;
            animation: shake 0.4s;
        }

        /* بنك العلامات (ثابت في الأسفل لحركة الإبهام) */
        .bank-container {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: white;
            padding: 15px;
            box-shadow: 0 -4px 15px rgba(0,0,0,0.1);
            border-top-left-radius: 20px;
            border-top-right-radius: 20px;
            z-index: 100;
        }

        .bank-title {
            text-align: center;
            font-size: 0.9rem;
            color: var(--text-muted);
            margin-bottom: 8px;
        }

        .signs-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            justify-content: center;
            max-height: 120px;
            overflow-y: auto;
        }

        .sign-badge {
            background: var(--primary-color);
            color: white;
            padding: 8px 12px;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.1s, opacity 0.2s;
            user-select: none;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }

        .sign-badge:active {
            transform: scale(0.9);
        }

        .sign-badge.selected {
            background: var(--secondary-color);
            transform: scale(1.1);
            box-shadow: 0 4px 10px rgba(242, 153, 74, 0.5);
            border: 2px solid #fff;
        }

        /* أنيميشن الاهتزاز عند الخطأ */
        @keyframes shake {
            0% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            50% { transform: translateX(5px); }
            75% { transform: translateX(-5px); }
            100% { transform: translateX(0); }
        }
        
        /* علامة فارغة في بنك العلامات للحفاظ على الشكل */
        .sign-badge.used {
             opacity: 0.3;
             pointer-events: none;
        }

    </style>
</head>
<body>

    <header class="top-bar">
        <a href="index.html" class="back-btn">العودة 🏠</a>
        <h2 style="font-size: 1.2rem; margin:0;">جدول الإعراب</h2>
        <div class="lives" style="font-weight:bold; background:rgba(0,0,0,0.1); padding: 5px 10px; border-radius:15px; font-size:0.9rem;" dir="ltr"><span id="livesVal">❤️❤️❤️</span></div>
    </header>

    <div class="instruction">
        👉 <b>انقر</b> على العلامة الإعرابية في الأسفل لاختيارها، ثم <b>انقر</b> على المربع الفارغ المناسب في الجدول لتضعها فيه!
    </div>

    <div class="table-container">
        <table class="grammar-table" id="mainTable">
            <thead>
                <tr>
                    <th>نوع الكلمة</th>
                    <th>الرفع</th>
                    <th>النصب</th>
                    <th>الجر</th>
                    <th>الجزم</th>
                </tr>
            </thead>
            <tbody id="tableBody">
                <!-- سيتم حقن الصفوف بواسطة الجافاسكربت -->
            </tbody>
        </table>
    </div>

    <div class="bank-container">
        <div class="bank-title">علبة العلامات الإعرابية - اختر من هنا 👇</div>
        <div class="signs-grid" id="signsBank">
            <!-- سيتم توليد العلامات هنا بواسطة الجافاسكربت -->
        </div>
    </div>

    <!-- استدعاء ملف المنطق -->
    <script src="confetti.js"></script>
    <script src="table.js"></script>
</body>
</html>
