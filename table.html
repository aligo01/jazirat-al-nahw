<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>لعبة جدول الإعراب</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="global.css">
    <style>
        body { background: #fdfbf7; padding-bottom: 150px; overflow-x: hidden; }
        
        .top-bar {
            background: var(--primary-color);
            color: white;
            padding: 10px 15px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            position: sticky;
            top: 0;
            z-index: 10;
        }

        .back-btn {
            color: white; text-decoration: none; font-weight: bold;
            background: rgba(255,255,255,0.2);
            padding: 5px 12px; border-radius: 20px; font-size: 0.9rem;
        }

        .instruction {
            text-align: center; padding: 10px; font-size: 0.95rem; color: var(--text-main);
            background: #fff; margin: 10px; border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }

        .swipe-hint {
            display: none; text-align: center; font-size: 0.8rem; color: var(--primary-color); animation: pulse 1.5s infinite;
        }

        @media (max-width: 600px) {
            .swipe-hint { display: block; }
        }

        /* تحسينات الموبايل: جعل الجدول يمرر بشكل مستقل دون ضغط الخلايا */
        .table-container {
            overflow-x: auto;
            padding: 5px;
            -webkit-overflow-scrolling: touch;
            width: 100vw;
            margin-right: -10px; /* لتعويض مسافات الجوانب */
        }

        .grammar-table {
            border-collapse: separate;
            border-spacing: 3px;
            width: max-content; /* هام جداً للموبايل لإجبار الجدول على أخذ مساحته الطبيعية */
            min-width: 100%;
            margin: 0 auto;
        }

        .grammar-table th {
            background: #eef2f5; color: #444; padding: 10px;
            border-radius: 6px; font-size: 0.9rem; text-align: center;
            white-space: nowrap;
        }

        .grammar-table td {
            background: white; padding: 6px; border-radius: 6px;
            text-align: center; vertical-align: middle;
            border: 2px dashed #ccc; height: 50px; min-width: 75px;
            transition: all 0.2s ease; white-space: nowrap; font-size: 0.95rem;
        }

        /* تثبيت العمود الأول أثناء سحب المستخدم للجدول */
        .row-header {
            background: #ffe0b2 !important; border: 2px solid #ffcc80 !important;
            font-weight: bold; font-size: 0.85rem !important;
            color: #d84315 !important; white-space: normal !important;
            width: 120px; min-width: 120px; position: sticky; right: 0; z-index: 5;
            box-shadow: -3px 0 6px rgba(0,0,0,0.05);
        }

        /* تصميم السطر المكتمل */
        .row-header.row-done {
            background: #c8e6c9 !important;
            border-color: #81c784 !important;
            color: #2e7d32 !important;
            font-size: 0.8rem !important;
        }

        .drop-slot { cursor: pointer; position: relative; }
        .drop-slot.selected-target { border-color: var(--primary-color); background: #e3effd; }
        .drop-slot.success { border: 2px solid var(--success-color); background: #e8f5e9; color: var(--success-color); font-weight: bold; }
        .drop-slot.error { border: 2px solid var(--danger-color); background: #ffebee; animation: shake 0.4s; }

        .bank-container {
            position: fixed; bottom: 0; left: 0; right: 0;
            background: white; padding: 12px; box-shadow: 0 -4px 15px rgba(0,0,0,0.1);
            border-top-left-radius: 20px; border-top-right-radius: 20px; z-index: 100;
        }

        .bank-title { text-align: center; font-size: 0.85rem; color: var(--text-muted); margin-bottom: 8px;}
        .signs-grid { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center;}
        
        .sign-badge {
            background: var(--primary-color); color: white; padding: 8px 12px;
            border-radius: 8px; font-size: 0.95rem; font-weight: bold; cursor: pointer;
            transition: transform 0.1s, opacity 0.2s; user-select: none;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }
        .sign-badge:active { transform: scale(0.9); }
        .sign-badge.selected {
            background: var(--secondary-color); transform: scale(1.1);
            box-shadow: 0 4px 10px rgba(242, 153, 74, 0.5); border: 2px solid #fff;
        }

        @keyframes shake {
            0% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            50% { transform: translateX(5px); }
            75% { transform: translateX(-5px); }
            100% { transform: translateX(0); }
        }
        @keyframes pulse {
            0%, 100% { opacity: 0.5; transform: scale(0.98); }
            50% { opacity: 1; transform: scale(1.02); }
        }
    </style>
</head>
<body>

    <header class="top-bar">
        <a href="index.html" class="back-btn">العودة 🏠</a>
        <div id="timerDisplay" style="font-weight:bold; font-size:0.95rem; background:rgba(0,0,0,0.1); padding: 5px 10px; border-radius:15px; color:#FFD700;">الوقت: 00:00</div>
        <div class="lives" style="font-weight:bold; background:rgba(0,0,0,0.1); padding: 5px 10px; border-radius:15px; font-size:0.9rem;" dir="ltr"><span id="livesVal">❤️❤️❤️</span></div>
    </header>

    <div class="instruction">
        👉 انقر العلامة بالأسفل لنسخها، ثم انقر المربع الذي يناسبها! 
    </div>
    <div class="swipe-hint">↔️ اسحب الجدول لليمين واليسار لرؤية بقية الخانات ↔️</div>

    <div class="table-container">
        <table class="grammar-table" id="mainTable">
            <thead>
                <tr>
                    <th style="position: sticky; right:0; z-index:5; box-shadow: -2px 0 5px rgba(0,0,0,0.05);">نوع الكلمة</th>
                    <th>الرفع</th>
                    <th>النصب</th>
                    <th>الجر</th>
                    <th>الجزم</th>
                </tr>
            </thead>
            <tbody id="tableBody">
            </tbody>
        </table>
    </div>

    <div class="bank-container">
        <div class="bank-title" id="bankTitle">اختر العلامة من هنا 👇</div>
        <div class="signs-grid" id="signsBank"></div>
    </div>

    <script src="confetti.js"></script>
    <script src="table.js"></script>
</body>
</html>
